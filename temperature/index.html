<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>温度转换器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(78, 205, 196, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-20px, 20px) rotate(5deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            max-width: 450px;
            width: 100%;
        }

        .title {
            text-align: center;
            margin-bottom: 40px;
        }

        .title h1 {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .thermometer-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .converter-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .converter-box:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .converter-box.celsius {
            border-left: 4px solid #ff6b6b;
        }

        .converter-box.fahrenheit {
            border-left: 4px solid #4ecdc4;
        }

        .converter-box label {
            display: block;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .converter-box.celsius label .icon {
            color: #ff6b6b;
        }

        .converter-box.fahrenheit label .icon {
            color: #4ecdc4;
        }

        .input-wrapper {
            position: relative;
        }

        .converter-box input {
            width: 100%;
            padding: 18px 60px 18px 20px;
            font-size: 1.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .converter-box.celsius input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }

        .converter-box.fahrenheit input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .converter-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .unit {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
        }

        .swap-section {
            display: flex;
            justify-content: center;
            margin: -10px 0;
            position: relative;
            z-index: 2;
        }

        .swap-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .swap-btn:active {
            transform: rotate(180deg) scale(0.95);
        }

        .formula {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .formula p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .formula code {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            color: #4ecdc4;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link span {
            margin-right: 8px;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
            }

            .title h1 {
                font-size: 1.8rem;
            }

            .converter-box {
                padding: 20px;
            }

            .converter-box input {
                font-size: 1.2rem;
                padding: 15px 50px 15px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <span class="thermometer-icon">🌡️</span>
            <h1>温度转换器</h1>
            <p>摄氏度 ↔ 华氏度 快速转换</p>
        </div>

        <div class="converter-box celsius">
            <label>
                <span class="icon">🔴</span>
                摄氏度 (Celsius)
            </label>
            <div class="input-wrapper">
                <input type="number" id="celsius" placeholder="输入摄氏度" oninput="celsiusToFahrenheit()">
                <span class="unit">°C</span>
            </div>
        </div>

        <div class="swap-section">
            <button class="swap-btn" onclick="swapValues()" title="交换数值">⇅</button>
        </div>

        <div class="converter-box fahrenheit">
            <label>
                <span class="icon">🔵</span>
                华氏度 (Fahrenheit)
            </label>
            <div class="input-wrapper">
                <input type="number" id="fahrenheit" placeholder="输入华氏度" oninput="fahrenheitToCelsius()">
                <span class="unit">°F</span>
            </div>
        </div>

        <div class="formula">
            <p>
                <code>°F = °C × 9/5 + 32</code><br>
                <code>°C = (°F - 32) × 5/9</code>
            </p>
        </div>

        <a href="../" class="back-link">
            <span>←</span> 返回导航首页
        </a>
    </div>

    <script>
        function celsiusToFahrenheit() {
            const celsius = document.getElementById('celsius').value;
            const fahrenheitInput = document.getElementById('fahrenheit');
            
            if (celsius === '' || isNaN(celsius)) {
                fahrenheitInput.value = '';
                return;
            }
            
            const fahrenheit = (parseFloat(celsius) * 9/5) + 32;
            fahrenheitInput.value = fahrenheit.toFixed(2);
        }

        function fahrenheitToCelsius() {
            const fahrenheit = document.getElementById('fahrenheit').value;
            const celsiusInput = document.getElementById('celsius');
            
            if (fahrenheit === '' || isNaN(fahrenheit)) {
                celsiusInput.value = '';
                return;
            }
            
            const celsius = (parseFloat(fahrenheit) - 32) * 5/9;
            celsiusInput.value = celsius.toFixed(2);
        }

        function swapValues() {
            const celsiusInput = document.getElementById('celsius');
            const fahrenheitInput = document.getElementById('fahrenheit');
            
            const tempCelsius = celsiusInput.value;
            const tempFahrenheit = fahrenheitInput.value;
            
            celsiusInput.value = tempFahrenheit;
            fahrenheitInput.value = tempCelsius;
            
            // 触发重新计算
            if (celsiusInput.value !== '') {
                celsiusToFahrenheit();
            }
        }

        // 键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('celsius').value = '';
                document.getElementById('fahrenheit').value = '';
            }
        });
    </script>
</body>
</html>
